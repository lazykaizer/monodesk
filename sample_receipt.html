<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=devicewidth, initial-scale=1.0">
    <title>Receipt</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .receipt {
            background-color: #fff;
            width: 300px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            border-bottom: 1px dashed #000;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .total {
            border-top: 1px dashed #000;
            padding-top: 10px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="receipt">
        <div class="header">
            <h3>CAFE MONO</h3>
            <p>123 Startup Avenue<br>San Francisco, CA 94105</p>
            <p>Date: 2024-05-24 09:30 AM</p>
        </div>
        <div class="item">
            <span>Latte (Large)</span>
            <span>$5.50</span>
        </div>
        <div class="item">
            <span>Avocado Toast</span>
            <span>$12.00</span>
        </div>
        <div class="item">
            <span>Blueberry Muffin</span>
            <span>$4.25</span>
        </div>
        <div class="total">
            <span>TOTAL</span>
            <span>$21.75</span>
        </div>
        <div class="footer">
            <p>Thank you for your business!</p>
            <p>Order #99281</p>
        </div>
    </div>
</body>

</html>
